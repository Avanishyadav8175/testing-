<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Police Officer -->
  <g transform="translate(50, 50)">
    <circle cx="40" cy="40" r="25" fill="#F4A460"/>
    <rect x="25" y="65" width="30" height="40" fill="#8B4513" rx="5"/>
    <rect x="20" y="105" width="40" height="30" fill="#000080" rx="5"/>
    <rect x="15" y="135" width="50" height="20" fill="#000080" rx="3"/>
    <rect x="25" y="155" width="10" height="25" fill="#000"/>
    <rect x="45" y="155" width="10" height="25" fill="#000"/>
    <circle cx="30" cy="30" r="3" fill="#000"/>
    <circle cx="50" cy="30" r="3" fill="#000"/>
    <rect x="35" y="35" width="10" height="3" fill="#000"/>
    <rect x="30" y="20" width="20" height="8" fill="#000080" rx="4"/>
    <text x="40" y="200" text-anchor="middle" fill="#000" font-size="12" font-weight="bold">Police</text>
  </g>
  
  <!-- Doctor -->
  <g transform="translate(150, 50)">
    <circle cx="40" cy="40" r="25" fill="#F4A460"/>
    <rect x="25" y="65" width="30" height="40" fill="#FFFFFF" rx="5"/>
    <rect x="20" y="105" width="40" height="30" fill="#FFFFFF" rx="5"/>
    <rect x="15" y="135" width="50" height="20" fill="#000" rx="3"/>
    <rect x="25" y="155" width="10" height="25" fill="#000"/>
    <rect x="45" y="155" width="10" height="25" fill="#000"/>
    <circle cx="30" cy="30" r="3" fill="#000"/>
    <circle cx="50" cy="30" r="3" fill="#000"/>
    <rect x="35" y="35" width="10" height="3" fill="#000"/>
    <circle cx="40" cy="85" r="8" fill="#FF0000"/>
    <rect x="36" y="81" width="8" height="2" fill="#FFF"/>
    <rect x="38" y="79" width="4" height="6" fill="#FFF"/>
    <text x="40" y="200" text-anchor="middle" fill="#000" font-size="12" font-weight="bold">Doctor</text>
  </g>
  
  <!-- Business Person -->
  <g transform="translate(250, 50)">
    <circle cx="40" cy="40" r="25" fill="#F4A460"/>
    <rect x="25" y="65" width="30" height="40" fill="#000080" rx="5"/>
    <rect x="20" y="105" width="40" height="30" fill="#000080" rx="5"/>
    <rect x="15" y="135" width="50" height="20" fill="#000" rx="3"/>
    <rect x="25" y="155" width="10" height="25" fill="#000"/>
    <rect x="45" y="155" width="10" height="25" fill="#000"/>
    <circle cx="30" cy="30" r="3" fill="#000"/>
    <circle cx="50" cy="30" r="3" fill="#000"/>
    <rect x="35" y="35" width="10" height="3" fill="#000"/>
    <rect x="30" y="60" width="20" height="3" fill="#FF0000"/>
    <rect x="10" y="80" width="15" height="20" fill="#8B4513" rx="3"/>
    <text x="40" y="200" text-anchor="middle" fill="#000" font-size="12" font-weight="bold">Business</text>
  </g>
</svg>